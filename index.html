  function getCurrentTerm() {                                                                                           
    var today = new Date();
    var closest = null;                                                                                                 
    var minDiff = Infinity;
    for (var i = 0; i < T.length; i++) {
      var term = T[i];                                                                                                  
      for (var j = 0; j < term.dates.length; j++) {
        var d = term.dates[j];                                                                                          
        var termDate = new Date(d[0], d[1]-1, d[2]);
        var diff = Math.round((today - termDate) / 86400000);                                                           
        if (Math.abs(diff) < Math.abs(minDiff)) {
          minDiff = diff;                                                                                               
          closest = { term: term, date: d[0]+"年"+d[1]+"月"+d[2]+"日", diff: diff };
        }                                                                                                               
      }           
    }                                                                                                                   
    return closest;
  }

  function render() {
    var card = document.getElementById("card");
    var info = document.getElementById("today-info");                                                                   
    var today = new Date();
    info.textContent = "今天是 "+today.getFullYear()+"年"+(today.getMonth()+1)+"月"+today.getDate()+"日";               
    var r = getCurrentTerm();                                                                                           
    if (!r || Math.abs(r.diff) > 7) {                                                                                   
      card.innerHTML = '<div class="no-term">目前不在任何節氣範圍內（前後7天）</div>';                                  
      return;                                                                                                           
    }                                                                                                                   
    var t = r.term;                                                                                                     
    var diffText = r.diff === 0 ? "今天正是節氣日" : r.diff > 0 ? "節氣日 "+r.date+"（"+r.diff+" 天前）" : "節氣日 
  "+r.date+"（還有 "+Math.abs(r.diff)+" 天）";                                                                          
    var foods = t.foods.map(function(f){ return '<span class="tag">'+f+'</span>'; }).join("");
    card.innerHTML =                                                                                                    
      '<div class="card-header">'+
        '<div class="term-name">'+t.name+'</div>'+                                                                      
        '<div class="term-date">'+diffText+'</div>'+                                                                    
        '<div class="term-desc">'+t.intro+'</div>'+                                                                     
      '</div>'+                                                                                                         
      '<div class="card-body">'+                                                                                        
        '<div class="section"><div class="section-title">☁️  氣候特徵</div><div 
  class="section-content">'+t.climate+'</div></div>'+                                                                   
        '<div class="section"><div class="section-title">🥢 當季食物</div><div class="tag-list">'+foods+'</div></div>'+
        '<div class="section"><div class="section-title">🌿 中醫養生建議</div><div                                      
  class="section-content">'+t.tcm+'</div></div>'+                                                                       
      '</div>';                                                                                                         
  }                                                                                                                     
                  
  render();                                                                                                             
  </script>
